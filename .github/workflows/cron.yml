name: 🔍 Loker Notifier

on:
  # Jalankan otomatis setiap hari jam 08:00 WIB (01:00 UTC)
  schedule:
    - cron: "0 1 * * *"

  # Bisa dijalankan manual dari tab Actions
  workflow_dispatch:
    inputs:
      force_send:
        description: "Kirim email meski tidak ada loker baru?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  scrape-and-notify:
    name: Scrape Loker & Kirim Email
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          clean: true

      # ── 2. Setup Python ──
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ──
      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      # ── 4. Jalankan scraper & mailer ──
      - name: 🚀 Run Job Notifier
        run: python src/main.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

      # ── 4. Summary ──
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 🔔 Loker Notifier Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Scraper dan mailer berhasil dijalankan." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 Dijalankan pada: $(TZ='Asia/Jakarta' date)" >> $GITHUB_STEP_SUMMARY
          echo "💾 Data tersimpan di Supabase database." >> $GITHUB_STEP_SUMMARY
# Force rebuild
